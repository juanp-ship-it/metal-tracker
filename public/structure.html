<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MetalTrack - Estructura</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <style>
    .phase-pill { display:inline-flex;align-items:center;gap:8px;background:#f8f9fa;border-radius:10px;padding:10px 16px;margin:4px;border:1px solid #e9ecef; }
    .phase-pill .phase-label { font-weight:700;font-size:.83rem; }
    .phase-pill .phase-time  { font-size:.75rem;color:#666; }
    .comp-card { border:1px solid #e9ecef;border-radius:12px;padding:16px;margin-bottom:12px; }
    .comp-card:hover { box-shadow:0 2px 10px rgba(0,0,0,.07); }
    .heat-badge { background:#e7f0ff;color:#0d6efd;font-weight:700;border-radius:8px;padding:3px 10px;font-size:.82rem; }
    .heat-note  { background:#fff8e1;border-left:3px solid #ffc107;padding:6px 10px;border-radius:4px;font-size:.82rem;color:#555;margin-top:6px; }
    .no-heat    { color:#bbb;font-size:.82rem; }
    .status-pill { display:inline-block;padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:600; }
    .back-btn { background:none;border:none;color:#0d6efd;font-size:.9rem;cursor:pointer;padding:0;margin-bottom:4px; }
    .back-btn:hover { text-decoration:underline; }
    .section-title { font-weight:700;font-size:1rem;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e9ecef; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="index.html">MetalTrack</a>
    <div class="navbar-nav ms-auto flex-row gap-3">
      <a class="nav-link" href="index.html">Dashboard</a>
      <a class="nav-link" href="admin.html">Administrar</a>
      <a class="nav-link" href="labels.html">Etiquetas</a>
      <a class="nav-link" href="report.html">Informes</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">

  <div id="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-3 text-muted">Cargando estructura...</p>
  </div>

  <div id="main" style="display:none">

    <!-- Header -->
    <div class="mb-3">
      <button class="back-btn" onclick="history.back()">← Volver al Dashboard</button>
      <h4 class="fw-bold mb-0" id="struct-name"></h4>
      <div class="text-muted small" id="struct-meta"></div>
    </div>

    <!-- Phase summary -->
    <div class="card mb-4">
      <div class="card-body">
        <div class="section-title">Resumen por Fase</div>
        <div id="phase-summary" class="d-flex flex-wrap gap-2"></div>
      </div>
    </div>

    <!-- Components -->
    <div class="card">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="section-title mb-0">Componentes</div>
          <span class="badge bg-secondary" id="comp-count"></span>
        </div>
        <div id="comp-list"></div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let STATUS_CONFIG = {};

const PHASE_NAMES  = { assembly:'Armado', welding:'Soldadura', galvanizing:'Galvanizado', final:'Insp. Final' };
const PHASE_COLORS = { assembly:'#0d6efd', welding:'#fd7e14', galvanizing:'#6f42c1', final:'#198754' };

function fmtDuration(ms) {
  if (!ms || ms < 0) return '';
  const m = Math.floor(ms / 60000);
  const d = Math.floor(m / 1440), h = Math.floor((m % 1440) / 60), min = m % 60;
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${min}m`;
  return `${min}m`;
}
function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleString('es-DO', { dateStyle:'short', timeStyle:'short' });
}
function elapsed(ts) {
  return fmtDuration(Date.now() - new Date(ts));
}

async function init() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) { document.getElementById('loading').innerHTML = '<p class="text-danger">Sin ID de estructura.</p>'; return; }

  const info = await fetch('/api/info').then(r => r.json());
  STATUS_CONFIG = info.STATUS_CONFIG;

  const [struct, tl] = await Promise.all([
    fetch(`/api/structures/${id}`).then(r => r.json()),
    fetch(`/api/structures/${id}/timeline`).then(r => r.json()),
  ]);

  // Load heat numbers and notes for all components
  const compDetails = await Promise.all(
    struct.components.map(c => fetch(`/api/components/${c.id}`).then(r => r.json()))
  );

  render(struct, tl, compDetails);
}

function render(struct, tl, compDetails) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';

  document.title = `${struct.name} - MetalTrack`;
  document.getElementById('struct-name').textContent = `${struct.project_name} — ${struct.name}`;
  document.getElementById('struct-meta').textContent =
    `${struct.components.length} componentes · ${struct.description || ''}`;
  document.getElementById('comp-count').textContent = struct.components.length + ' componentes';

  // Phase summary
  const phaseSummaryHtml = tl.phaseSummary.map(p => {
    const color = PHASE_COLORS[p.key] || '#333';
    const started = p.anyStarted;
    if (!started) {
      return `<div class="phase-pill">
        <div>
          <div class="phase-label" style="color:#aaa">${PHASE_NAMES[p.key]}</div>
          <div class="phase-time">Pendiente</div>
        </div>
      </div>`;
    }
    const done = p.allDone;
    const timeStr = done
      ? `Duración: ${fmtDuration(p.duration_ms)}`
      : `En curso: ${elapsed(p.firstStart)}`;
    return `<div class="phase-pill" style="border-color:${color}20;background:${color}08">
      <div>
        <div class="phase-label" style="color:${color}">${PHASE_NAMES[p.key]} ${done ? '✓' : '...'}</div>
        <div class="phase-time">Inicio: ${fmtDate(p.firstStart)}</div>
        <div class="phase-time" style="color:${done?'#198754':'#fd7e14'}">${timeStr}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('phase-summary').innerHTML = phaseSummaryHtml;

  // Components
  const compMap = {};
  tl.components.forEach(c => compMap[c.id] = c);

  const compHtml = compDetails.map(c => {
    const cfg = STATUS_CONFIG[c.status] || {};
    const tlComp = compMap[c.id];

    // Timeline phases
    const phases = tlComp ? tlComp.timeline.filter(p => p.started_at).map(p => {
      const color = PHASE_COLORS[p.key] || '#333';
      const inProg = p.status === 'in_progress' || p.status === 'rejected';
      const time = inProg ? `<span style="color:#fd7e14">${elapsed(p.started_at)}</span>` : fmtDuration(p.duration_ms);
      return `<span style="font-size:.75rem;color:#555;margin-right:10px">
        <span style="color:${color};font-weight:600">${PHASE_NAMES[p.key]}</span> ${time}
        ${p.attempts > 1 ? `<span style="color:#dc3545;font-size:.7rem">(${p.attempts} intentos)</span>` : ''}
      </span>`;
    }).join('') : '';

    // Heat number and notes from history
    const heatHistory = (c.history || [])
      .filter(h => h.action === 'heat_update')
      .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

    const heatHtml = c.heat_number
      ? `<span class="heat-badge">HN: ${c.heat_number}</span>`
      : `<span class="no-heat">Sin heat number</span>`;

    const notesHtml = heatHistory.length
      ? heatHistory.map(h => {
          const note = h.notes.replace(/^Heat Number: [^|]+ \| ?/, '').trim();
          return note ? `<div class="heat-note">${fmtDate(h.timestamp)} — ${note}</div>` : '';
        }).filter(Boolean).join('')
      : '';

    return `<div class="comp-card">
      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
          <div class="fw-bold">${c.name}</div>
          ${c.description ? `<div class="text-muted small">${c.description}</div>` : ''}
          <div class="mt-1">${phases}</div>
        </div>
        <div class="text-end">
          <span class="status-pill" style="background:${cfg.bg||'#eee'};color:${cfg.color||'#333'}">${cfg.label||c.status}</span>
          <div class="mt-2">${heatHtml}</div>
        </div>
      </div>
      ${notesHtml ? `<div class="mt-2">${notesHtml}</div>` : ''}
      <div class="mt-2 text-end">
        <a href="scan.html?id=${c.id}" class="btn btn-sm btn-outline-primary">Ver / Escanear</a>
      </div>
    </div>`;
  }).join('');

  document.getElementById('comp-list').innerHTML = compHtml || '<p class="text-muted">Sin componentes</p>';
}

init();
</script>
</body>
</html>
