<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MetalTrack - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="index.html">MetalTrack</a>
    <div class="navbar-nav ms-auto flex-row gap-3">
      <a class="nav-link active" href="index.html">Dashboard</a>
      <a class="nav-link" href="admin.html">Administrar</a>
      <a class="nav-link" href="labels.html">Etiquetas</a><a class="nav-link" href="report.html">Informes</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">

  <!-- Summary bar -->
  <div id="summary-bar" class="row g-3 mb-4"></div>

  <!-- Projects -->
  <div id="projects-container" class="row g-4"></div>

  <div id="empty-state" class="text-center py-5 d-none">
    
    <h4 class="text-muted mt-3">No hay proyectos todavía</h4>
    <p class="text-muted">Ve a <a href="admin.html">Administrar</a> para crear tu primer proyecto.</p>
  </div>

</div>

<!-- Detail Modal -->
<div class="modal fade" id="structureModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="structureModalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="structureModalBody"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let STATUS_CONFIG = {};
let ACTION_CONFIG = {};
let STATUS_NEXT = {};

const STATUS_ORDER = [
  'pending','assembly_in_progress','assembly_rejected','assembly_approved',
  'welding_in_progress','welding_rejected','welding_approved','galvanizing','galvanized'
];

function statusColor(s) {
  return STATUS_CONFIG[s]?.color || '#aaa';
}
function statusLabel(s) {
  return STATUS_CONFIG[s]?.label || s;
}
function statusIcon(s) {
  return STATUS_CONFIG[s]?.icon || '';
}

function progressColor(pct) {
  if (pct === 100) return '#198754';
  if (pct >= 60) return '#0d6efd';
  if (pct >= 30) return '#ffc107';
  return '#dc3545';
}

function makeStatusBadge(status) {
  const cfg = STATUS_CONFIG[status] || {};
  return `<span class="status-badge" style="background:${cfg.bg||'#eee'};color:${cfg.color||'#333'}">
    ${cfg.icon||''} ${cfg.label||status}
  </span>`;
}

async function init() {
  const info = await fetch('/api/info').then(r=>r.json());
  STATUS_CONFIG = info.STATUS_CONFIG;
  ACTION_CONFIG = info.ACTION_CONFIG;
  STATUS_NEXT   = info.STATUS_NEXT;
  await loadDashboard();
}

async function loadDashboard() {
  const projects = await fetch('/api/projects').then(r=>r.json());

  // Summary
  const totalProj = projects.length;
  const totalComp = projects.reduce((a,p)=>a+p.component_count,0);
  const totalDone = projects.reduce((a,p)=>a+p.done_count,0);
  const pct = totalComp ? Math.round(totalDone/totalComp*100) : 0;

  document.getElementById('summary-bar').innerHTML = `
    <div class="col-6 col-md-3"><div class="card text-center p-3">
      <div class="fs-2 fw-bold text-primary">${totalProj}</div>
      <div class="text-muted small">Proyectos</div>
    </div></div>
    <div class="col-6 col-md-3"><div class="card text-center p-3">
      <div class="fs-2 fw-bold" style="color:#0dcaf0">${projects.reduce((a,p)=>a+p.structure_count,0)}</div>
      <div class="text-muted small">Estructuras</div>
    </div></div>
    <div class="col-6 col-md-3"><div class="card text-center p-3">
      <div class="fs-2 fw-bold text-secondary">${totalComp}</div>
      <div class="text-muted small">Componentes</div>
    </div></div>
    <div class="col-6 col-md-3"><div class="card text-center p-3">
      <div class="fs-2 fw-bold" style="color:${progressColor(pct)}">${pct}%</div>
      <div class="text-muted small">Completado</div>
    </div></div>
  `;

  const container = document.getElementById('projects-container');
  const empty = document.getElementById('empty-state');

  if (!projects.length) {
    container.innerHTML = '';
    empty.classList.remove('d-none');
    return;
  }
  empty.classList.add('d-none');

  const cards = await Promise.all(projects.map(p => buildProjectCard(p)));
  container.innerHTML = cards.join('');
}

async function buildProjectCard(p) {
  const detail = await fetch(`/api/projects/${p.id}`).then(r=>r.json());
  const pct = p.component_count ? Math.round(p.done_count/p.component_count*100) : 0;
  const color = progressColor(pct);

  const structureRows = detail.structures.map(s => {
    console.log('estructura:', s.id, s.name);
    const sDone = s.done_count || 0;
    const sTotal = s.component_count || 0;
    const sPct = sTotal ? Math.round(sDone/sTotal*100) : 0;
    const statuses = (s.statuses||'').split(',').filter(Boolean);
    const hasRejected = statuses.some(st=>st.includes('rejected'));
    const isComplete = sDone === sTotal && sTotal > 0;
    const cls = hasRejected ? 'has-issues' : isComplete ? 'complete' : sTotal > 0 ? 'in-progress' : '';

    const dots = buildStatusDots(statuses);

    return `
      <a href="structure.html?id=${s.id}" class="structure-row ${cls} mb-2 d-block text-decoration-none" style="cursor:pointer;color:inherit">
        <div class="d-flex justify-content-between align-items-center">
          <span class="fw-semibold" style="font-size:.9rem">${s.name}</span>
          <span class="text-muted small">${sDone}/${sTotal}</span>
        </div>
        <div class="d-flex gap-1 flex-wrap mt-1">${dots}</div>
        <div class="progress mt-1" style="height:4px">
          <div class="progress-bar" style="width:${sPct}%;background:${progressColor(sPct)}"></div>
        </div>
      </a>
    `;
  }).join('');

  return `
    <div class="col-12 col-md-6 col-xl-4">
      <div class="card h-100">
        <div class="project-header" style="cursor:pointer" onclick="toggleStructures(${p.id})">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <h5 class="mb-0 fw-bold">${p.name}</h5>
              ${p.client ? `<small class="opacity-75">Cliente: ${p.client}</small>` : ''}
            </div>
            <div class="d-flex align-items-center gap-2">
              <span class="project-percent" style="color:${color === '#198754' ? '#7fffb4' : '#ffd484'}">${pct}%</span>
              <span id="arrow-${p.id}" style="font-size:1.1rem;color:rgba(255,255,255,.7);transition:transform .2s">▼</span>
            </div>
          </div>
          <div class="progress mt-2" style="height:6px;background:rgba(255,255,255,.2)">
            <div class="progress-bar" style="width:${pct}%;background:${color}"></div>
          </div>
          <div class="mt-1 opacity-75 small">${p.done_count} / ${p.component_count} componentes | ${p.structure_count} estructuras</div>
        </div>
        <div class="card-body p-3" id="structs-${p.id}" style="display:none">
          ${structureRows || '<p class="text-muted small">Sin estructuras</p>'}
        </div>
        <div class="card-footer d-flex gap-2">
          <a href="labels.html?project_id=${p.id}" class="btn btn-sm btn-outline-secondary flex-fill">Etiquetas</a>
          <button class="btn btn-sm btn-outline-primary flex-fill" onclick="event.stopPropagation();refreshCard(${p.id})">Actualizar</button>
        </div>
      </div>
    </div>
  `;
}

function buildStatusDots(statuses) {
  if (!statuses.length) return '<span class="text-muted small">Sin componentes</span>';
  const counts = {};
  for (const s of statuses) counts[s] = (counts[s]||0)+1;
  return Object.entries(counts).map(([s,n]) =>
    `<span title="${statusLabel(s)}: ${n}" class="status-badge" style="background:${STATUS_CONFIG[s]?.bg||'#eee'};color:${STATUS_CONFIG[s]?.color||'#333'};font-size:.65rem;padding:2px 7px">
      ${STATUS_CONFIG[s]?.icon||''} ${n}
    </span>`
  ).join('');
}

function fmtDuration(ms) {
  if (!ms || ms < 0) return '';
  const m = Math.floor(ms / 60000);
  const d = Math.floor(m / 1440), h = Math.floor((m % 1440) / 60), min = m % 60;
  if (d > 0) return `${d}d ${h}h ${min}m`;
  if (h > 0) return `${h}h ${min}m`;
  return `${min}m`;
}
function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleString('es-DO', { dateStyle: 'short', timeStyle: 'short' });
}
function elapsedSince(ts) {
  if (!ts) return '';
  return fmtDuration(Date.now() - new Date(ts));
}

async function showStructure(id, name) {
  const [data, tl] = await Promise.all([
    fetch(`/api/structures/${id}`).then(r=>r.json()),
    fetch(`/api/structures/${id}/timeline`).then(r=>r.json()),
  ]);
  document.getElementById('structureModalTitle').textContent = `${data.project_name}  ${data.name}`;

  // Phase summary bar
  const PHASE_ICONS = { assembly:'', welding:'', galvanizing:'ï' };
  const PHASE_NAMES = { assembly:'Armado', welding:'Soldadura', galvanizing:'Galvanizado' };
  const phaseSummaryHtml = tl.phaseSummary.filter(p => p.anyStarted).map(p => {
    const done = p.allDone;
    const color = done ? '#198754' : '#fd7e14';
    const elapsed = done
      ? `Duración: <strong>${fmtDuration(p.duration_ms)}</strong>`
      : `En curso: <strong>${elapsedSince(p.firstStart)}</strong>`;
    return `<div style="display:inline-flex;align-items:center;gap:8px;background:#f8f9fa;border-radius:8px;padding:8px 14px;margin:4px">
      <span style="font-size:1.3rem">${PHASE_ICONS[p.key]}</span>
      <div>
        <div style="font-weight:700;font-size:.85rem;color:${color}">${PHASE_NAMES[p.key]} ${done?'':''}</div>
        <div style="font-size:.75rem;color:#666">Inicio: ${fmtDate(p.firstStart)}</div>
        <div style="font-size:.75rem;color:${color}">${elapsed}</div>
      </div>
    </div>`;
  }).join('');

  // Component rows with per-phase timing
  const compMap = {};
  tl.components.forEach(c => compMap[c.id] = c);

  const rows = data.components.map(c => {
    const cfg = STATUS_CONFIG[c.status]||{};
    const tlComp = compMap[c.id];
    let timingHtml = '';
    if (tlComp) {
      const activePh = tlComp.timeline.filter(p => p.started_at);
      timingHtml = activePh.map(p => {
        const inProg = p.status === 'in_progress' || p.status === 'rejected';
        const timeStr = inProg ? `<span style="color:#fd7e14">${elapsedSince(p.started_at)}</span>` : fmtDuration(p.duration_ms);
        return `<span style="font-size:.7rem;margin-right:6px">${PHASE_ICONS[p.key]} ${timeStr}</span>`;
      }).join('');
    }
    return `<tr>
      <td class="fw-semibold">${c.name}</td>
      <td>${makeStatusBadge(c.status)}</td>
      <td style="font-size:.78rem;white-space:nowrap">${timingHtml||''}</td>
      <td><a href="scan.html?id=${c.id}" target="_blank" class="btn btn-sm btn-outline-primary">Ver</a></td>
    </tr>`;
  }).join('');

  document.getElementById('structureModalBody').innerHTML = `
    ${phaseSummaryHtml ? `<div style="margin-bottom:14px;display:flex;flex-wrap:wrap;gap:4px">${phaseSummaryHtml}</div>` : ''}
    <table class="table table-hover table-sm">
      <thead><tr><th>Componente</th><th>Estado</th><th>Tiempos por fase</th><th></th></tr></thead>
      <tbody>${rows || '<tr><td colspan="4" class="text-center text-muted">Sin componentes</td></tr>'}</tbody>
    </table>
  `;
  new bootstrap.Modal(document.getElementById('structureModal')).show();
}

function toggleStructures(projectId) {
  const body = document.getElementById(`structs-${projectId}`);
  const arrow = document.getElementById(`arrow-${projectId}`);
  const visible = body.style.display !== 'none';
  body.style.display = visible ? 'none' : 'block';
  arrow.style.transform = visible ? '' : 'rotate(180deg)';
}

async function refreshCard(projectId) {
  await loadDashboard();
}

function escape(s) { return s.replace(/'/g,"\\'"); }

init();
setInterval(loadDashboard, 30000); // auto-refresh every 30s
</script>
</body>
</html>
